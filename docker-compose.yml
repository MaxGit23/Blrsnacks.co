# ──────────────────────────────────────────────────────────────────────────────
# Blrsnacks.co — Docker Compose (Production)
# Database: Supabase (external managed PostgreSQL — no local DB container needed)
# Usage: docker compose -f docker-compose.yml up -d
# ──────────────────────────────────────────────────────────────────────────────

services:
  # ─── NestJS Backend API ────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blrsnacks-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN_SECONDS: ${JWT_EXPIRES_IN_SECONDS:-900}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN_SECONDS: ${JWT_REFRESH_EXPIRES_IN_SECONDS:-604800}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      FRONTEND_URL: ${FRONTEND_URL:-https://blrsnacks.co}
    ports:
      - "3001:3001"
    volumes:
      - uploads:/app/uploads
    networks:
      - blrsnacks

  # ─── Prisma Migrations (run once against Supabase direct connection) ───────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    container_name: blrsnacks-migrate
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
    command: npx prisma migrate deploy
    networks:
      - blrsnacks
    profiles:
      - migrate

volumes:
  uploads:
    driver: local

networks:
  blrsnacks:
    driver: bridge
