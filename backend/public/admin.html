<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BLR Snacks — Admin</title>
  <style>
    /* ── Reset & Base ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #f7f7f5;
      --surface:  #ffffff;
      --border:   #e2e2de;
      --text:     #1a1a18;
      --muted:    #6b6b62;
      --accent:   #e85d04;
      --accent-lt:#fff4ed;
      --green:    #16a34a;
      --green-lt: #f0fdf4;
      --amber:    #d97706;
      --amber-lt: #fffbeb;
      --red:      #dc2626;
      --red-lt:   #fef2f2;
      --blue:     #2563eb;
      --blue-lt:  #eff6ff;
      --radius:   6px;
      --mono:     ui-monospace, 'Cascadia Code', 'Source Code Pro', monospace;
    }
    html, body { height: 100%; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    button {
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      padding: 5px 12px;
      border-radius: var(--radius);
      line-height: 1.4;
      transition: background 0.12s, border-color 0.12s;
    }
    button:hover { background: var(--bg); }
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    button.primary:hover { background: #dc4c00; border-color: #dc4c00; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    input, select, textarea {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      font-family: inherit;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.12s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 4px; letter-spacing: .03em; text-transform: uppercase; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead tr { border-bottom: 2px solid var(--border); }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:hover { background: var(--bg); }
    th { text-align: left; padding: 8px 12px; font-size: 11px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--muted); }
    td { padding: 10px 12px; vertical-align: middle; }
    dialog {
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) * 2);
      padding: 0;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 20px 40px rgb(0 0 0 / .15);
    }
    dialog::backdrop { background: rgb(0 0 0 / .4); backdrop-filter: blur(2px); }

    /* ── Layout ────────────────────────────────────────────── */
    #app { display: flex; height: 100vh; overflow: hidden; }
    #sidebar {
      width: 220px;
      min-width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    #sidebar-logo {
      padding: 20px 16px 16px;
      border-bottom: 1px solid var(--border);
    }
    #sidebar-logo strong { font-size: 15px; display: block; }
    #sidebar-logo span { font-size: 11px; color: var(--muted); }
    #sidebar nav { padding: 10px 8px; flex: 1; }
    #sidebar nav a {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      transition: background 0.1s;
    }
    #sidebar nav a:hover { background: var(--bg); text-decoration: none; }
    #sidebar nav a.active { background: var(--accent-lt); color: var(--accent); font-weight: 600; }
    #sidebar nav .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      padding: 14px 10px 4px;
    }
    #sidebar-footer {
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      font-size: 12px;
    }
    #sidebar-footer .email { color: var(--muted); margin-bottom: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #topbar {
      padding: 0 24px;
      height: 52px;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    #topbar h1 { font-size: 16px; font-weight: 700; }
    #content { flex: 1; overflow-y: auto; padding: 24px; }

    /* ── Login Screen ──────────────────────────────────────── */
    #login-screen {
      display: none;
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #login-screen.visible { display: flex; }
    #login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) * 2);
      padding: 32px 28px;
      width: 340px;
      box-shadow: 0 4px 24px rgb(0 0 0 / .08);
    }
    #login-box h2 { font-size: 18px; margin-bottom: 4px; }
    #login-box p { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
    #login-box .field { margin-bottom: 14px; }
    #login-box .err { color: var(--red); font-size: 12px; margin-top: 10px; }

    /* ── Cards / Stats ─────────────────────────────────────── */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) * 2);
      padding: 18px 20px;
    }
    .stat-card .label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 6px; }
    .stat-card .value { font-size: 26px; font-weight: 700; line-height: 1; }
    .stat-card .sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* ── Panel / Table container ──────────────────────────── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) * 2);
      overflow: hidden;
    }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .panel-header h2 { font-size: 14px; font-weight: 700; }
    .panel-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .table-wrap { overflow-x: auto; }

    /* ── Badges ────────────────────────────────────────────── */
    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .03em;
      padding: 2px 8px;
      border-radius: 100px;
    }
    .badge-green  { background: var(--green-lt);  color: var(--green); }
    .badge-amber  { background: var(--amber-lt);  color: var(--amber); }
    .badge-red    { background: var(--red-lt);    color: var(--red); }
    .badge-blue   { background: var(--blue-lt);   color: var(--blue); }
    .badge-grey   { background: var(--bg);        color: var(--muted); border: 1px solid var(--border); }
    .badge-accent { background: var(--accent-lt); color: var(--accent); }

    /* ── Misc ───────────────────────────────────────────────── */
    .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
    .toolbar input { max-width: 240px; }
    .mono { font-family: var(--mono); }
    .muted { color: var(--muted); }
    .text-right { text-align: right; }
    .empty { text-align: center; padding: 48px 24px; color: var(--muted); font-size: 13px; }
    .loading { text-align: center; padding: 32px; color: var(--muted); }
    .error-msg { color: var(--red); font-size: 12px; margin-top: 4px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field { margin-bottom: 14px; }
    .form-title { font-size: 15px; font-weight: 700; padding: 18px 20px 0; }
    .form-body { padding: 16px 20px; }
    .form-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
    .alert {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      margin-bottom: 16px;
    }
    .alert-amber { background: var(--amber-lt); color: var(--amber); border: 1px solid #fde68a; }
    .stock-bar { height: 4px; background: var(--border); border-radius: 99px; margin-top: 4px; overflow: hidden; }
    .stock-bar-fill { height: 100%; border-radius: 99px; transition: width .3s; }
    tr.btn-link { cursor: pointer; }
  </style>
</head>
<body>

<!-- ── Login ──────────────────────────────────────────────────── -->
<div id="login-screen">
  <div id="login-box">
    <h2>🥜 BLR Snacks</h2>
    <p>Admin access only</p>
    <div class="field"><label for="l-email">Email</label><input id="l-email" type="email" placeholder="admin@blrsnacks.co" autocomplete="username" /></div>
    <div class="field"><label for="l-pass">Password</label><input id="l-pass" type="password" placeholder="••••••••" autocomplete="current-password" /></div>
    <button class="primary" id="login-btn" style="width:100%">Sign in</button>
    <div class="err" id="login-err"></div>
  </div>
</div>

<!-- ── App Shell ────────────────────────────────────────────────── -->
<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-logo">
      <strong>🥜 BLR Snacks</strong>
      <span>Admin Panel</span>
    </div>
    <nav>
      <div class="section-label">Overview</div>
      <a href="#" data-page="dashboard" class="active">📊 Dashboard</a>
      <div class="section-label">Catalogue</div>
      <a href="#" data-page="products">📦 Products</a>
      <a href="#" data-page="inventory">🏪 Inventory</a>
      <a href="#" data-page="categories">🏷 Categories</a>
      <div class="section-label">Operations</div>
      <a href="#" data-page="orders">🧾 Orders</a>
      <a href="#" data-page="customers">👤 Customers</a>
    </nav>
    <div id="sidebar-footer">
      <div class="email" id="admin-email">—</div>
      <button id="logout-btn" style="width:100%;font-size:12px">Sign out</button>
    </div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="topbar">
      <h1 id="page-title">Dashboard</h1>
      <div id="topbar-actions"></div>
    </div>
    <div id="content">
      <div class="loading">Loading…</div>
    </div>
  </div>
</div>

<!-- ── Dialog ───────────────────────────────────────────────────── -->
<dialog id="modal">
  <div class="form-title" id="modal-title"></div>
  <div class="form-body" id="modal-body"></div>
  <div class="form-footer" id="modal-footer"></div>
</dialog>

<script>
/* ── Config ─────────────────────────────────────────────── */
const API = '/api/v1';

/* ── State ──────────────────────────────────────────────── */
let accessToken = localStorage.getItem('admin_token') || '';
let currentUser = null;

/* ── API Helper ─────────────────────────────────────────── */
async function api(method, path, body) {
  const opts = {
    method,
    headers: {
      'Content-Type': 'application/json',
      ...(accessToken ? { Authorization: `Bearer ${accessToken}` } : {}),
    },
  };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  if (res.status === 401) { showLogin(); return null; }
  const json = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(json.message || res.statusText);
  return json;
}

/* ── Formatting ─────────────────────────────────────────── */
const fmtINR = (n) => '₹' + Number(n).toLocaleString('en-IN');
const fmtDate = (s) => s ? new Date(s).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) : '—';

/* ── Badges ─────────────────────────────────────────────── */
function badgeStatus(s) {
  const map = { PENDING:'amber', CONFIRMED:'blue', SHIPPED:'accent', DELIVERED:'green', CANCELLED:'red' };
  return `<span class="badge badge-${map[s]||'grey'}">${s}</span>`;
}
function badgeStock(n) {
  if (n <= 0)  return `<span class="badge badge-grey">0 in stock</span>`;
  if (n <= 10) return `<span class="badge badge-amber">${n} left</span>`;
  return `<span class="badge badge-green">${n} in stock</span>`;
}

/* ── Login ──────────────────────────────────────────────── */
function showLogin() {
  accessToken = '';
  localStorage.removeItem('admin_token');
  document.getElementById('login-screen').classList.add('visible');
}
function hideLogin() {
  document.getElementById('login-screen').classList.remove('visible');
}

document.getElementById('login-btn').onclick = async () => {
  const email = document.getElementById('l-email').value.trim();
  const pass  = document.getElementById('l-pass').value;
  const err   = document.getElementById('login-err');
  err.textContent = '';
  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass }),
      credentials: 'include',
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.message || 'Login failed'; return; }
    if (!data.user || data.user.role !== 'ADMIN') {
      err.textContent = 'Access denied. Admin accounts only.';
      return;
    }
    accessToken = data.accessToken;
    localStorage.setItem('admin_token', accessToken);
    currentUser = data.user;
    document.getElementById('admin-email').textContent = currentUser.email;
    hideLogin();
    navigate('dashboard');
  } catch (e) {
    err.textContent = 'Login failed: ' + e.message;
  }
};

document.getElementById('l-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-btn').click();
});

document.getElementById('logout-btn').onclick = async () => {
  await fetch(API + '/auth/logout', { method: 'POST', credentials: 'include' }).catch(() => {});
  showLogin();
};

/* ── Routing ────────────────────────────────────────────── */
function navigate(page) {
  document.querySelectorAll('#sidebar nav a').forEach(a => {
    a.classList.toggle('active', a.dataset.page === page);
  });
  const titles = { dashboard:'Dashboard', products:'Products', inventory:'Inventory', categories:'Categories', orders:'Orders', customers:'Customers' };
  document.getElementById('page-title').textContent = titles[page] || page;
  document.getElementById('topbar-actions').innerHTML = '';
  const pages = { dashboard: renderDashboard, products: renderProducts, inventory: renderInventory, categories: renderCategories, orders: renderOrders, customers: renderCustomers };
  (pages[page] || (() => setContent('<div class="empty">Page not found</div>')))();
}

document.querySelectorAll('#sidebar nav a').forEach(a => {
  a.onclick = e => { e.preventDefault(); navigate(a.dataset.page); };
});

function setContent(html) {
  document.getElementById('content').innerHTML = html;
}

/* ── Modal Helper ────────────────────────────────────────── */
const modal = document.getElementById('modal');
function openModal(title, body, footer) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = footer;
  modal.showModal();
}
function closeModal() { modal.close(); }
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

/* ── Dashboard ───────────────────────────────────────────── */
async function renderDashboard() {
  setContent('<div class="loading">Loading stats…</div>');
  try {
    const stats = await api('GET', '/admin/stats');
    if (!stats) return;

    const recentOrders = await api('GET', '/orders?limit=5&page=1');
    const lowStockReq = await api('GET', '/inventory/low-stock?threshold=10');
    const lowStock = (lowStockReq?.data || lowStockReq || []);

    const pendingAlert = stats.pendingOrders > 0
      ? `<div class="alert alert-amber">⚠️ <strong>${stats.pendingOrders}</strong> order${stats.pendingOrders > 1 ? 's' : ''} awaiting confirmation</div>`
      : '';

    const orderRows = (recentOrders?.data || []).slice(0, 5).map(o => `
      <tr>
        <td class="mono">#${o.id.slice(-8).toUpperCase()}</td>
        <td>${o.user?.email || '—'}</td>
        <td>${badgeStatus(o.status)}</td>
        <td class="text-right">${fmtINR(o.totalAmount)}</td>
        <td class="muted">${fmtDate(o.createdAt)}</td>
      </tr>
    `).join('') || '<tr><td colspan="5" class="empty">No orders yet</td></tr>';

    const stockRows = lowStock.slice(0, 8).map(inv => {
      const avail = inv.stock;
      return `
        <tr>
          <td>${inv.product?.name || '—'}</td>
          <td class="text-right">${badgeStock(avail)}</td>
        </tr>`;
    }).join('') || '<tr><td colspan="2" class="empty">All well-stocked</td></tr>';

    setContent(`
      ${pendingAlert}
      <div class="stats-grid">
        <div class="stat-card"><div class="label">Total Orders</div><div class="value">${stats.totalOrders}</div></div>
        <div class="stat-card"><div class="label">Revenue</div><div class="value">${fmtINR(stats.totalRevenue)}</div><div class="sub">excl. cancelled</div></div>
        <div class="stat-card"><div class="label">Products</div><div class="value">${stats.totalProducts}</div></div>
        <div class="stat-card"><div class="label">Customers</div><div class="value">${stats.totalUsers}</div></div>
        <div class="stat-card"><div class="label">Pending</div><div class="value" style="color:var(--amber)">${stats.pendingOrders}</div><div class="sub">awaiting action</div></div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:0">
        <div class="panel">
          <div class="panel-header"><h2>Recent Orders</h2></div>
          <div class="table-wrap">
            <table><thead><tr><th>Order</th><th>Customer</th><th>Status</th><th>Amount</th><th>Date</th></tr></thead>
            <tbody>${orderRows}</tbody></table>
          </div>
        </div>
        <div class="panel">
          <div class="panel-header"><h2>Low Stock</h2></div>
          <div class="table-wrap">
            <table><thead><tr><th>Product</th><th class="text-right">Available</th></tr></thead>
            <tbody>${stockRows}</tbody></table>
          </div>
        </div>
      </div>
    `);
  } catch (e) {
    setContent(`<div class="empty" style="color:var(--red)">Failed to load stats: ${e.message}</div>`);
  }
}

/* ── Products ────────────────────────────────────────────── */
let productSearch = '', productPage = 1;
async function renderProducts() {
  setContent('<div class="loading">Loading products…</div>');
  document.getElementById('topbar-actions').innerHTML = `<button class="primary" onclick="openProductForm()">+ Add Product</button>`;
  await loadProducts();
}

async function loadProducts() {
  try {
    const qs = `?page=${productPage}&limit=15${productSearch ? '&search=' + encodeURIComponent(productSearch) : ''}`;
    const data = await api('GET', '/products/admin/all' + qs);
    if (!data) return;
    const items = data.data || data;
    const meta = data.meta || {};

    const rows = items.map(p => {
      const avail = p.inventory ? p.inventory.stock - p.inventory.reservedStock : '—';
      const pub = p.isPublished ? `<span class="badge badge-green">Live</span>` : `<span class="badge badge-grey">Draft</span>`;
      const thumb = p.images && p.images.length > 0 ? `<img src="${p.images[0]}" style="width:36px;height:36px;object-fit:cover;border-radius:4px;vertical-align:middle;margin-right:12px;display:inline-block">` : `<div style="width:36px;height:36px;background:var(--bg);border-radius:4px;display:inline-block;vertical-align:middle;margin-right:12px"></div>`;
      
      return `<tr>
        <td style="display:flex;align-items:center;">
          ${thumb}
          <div>
            <strong>${esc(p.name)}</strong><br>
            <span class="muted" style="font-size:11px">${esc(p.slug)}</span>
          </div>
        </td>
        <td>${esc(p.category?.name || '—')}</td>
        <td class="text-right">${fmtINR(p.price)}</td>
        <td>${pub}</td>
        <td>${typeof avail === 'number' ? badgeStock(avail) : '—'}</td>
        <td class="text-right">
          <button onclick='openProductForm(${JSON.stringify(p).replace(/'/g, "&#39;")})' style="margin-right:4px">Edit</button>
          <button onclick="deleteProduct('${p.id}','${esc(p.name)}')" style="color:var(--red)">Del</button>
        </td>
      </tr>`;
    }).join('') || '<tr><td colspan="6" class="empty">No products found</td></tr>';

    const total = meta.total || items.length;
    const pages = meta.totalPages || 1;

    setContent(`
      <div class="toolbar">
        <input placeholder="Search products…" value="${esc(productSearch)}" oninput="productSearch=this.value" onkeydown="if(event.key==='Enter'){productPage=1;loadProducts()}" style="max-width:240px" />
        <button onclick="productPage=1;loadProducts()">Search</button>
        <span class="muted" style="margin-left:auto;font-size:12px">${total} products</span>
      </div>
      <div class="panel">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Product</th><th>Category</th><th>Price</th><th>Status</th><th>Stock</th><th></th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
        ${pages > 1 ? `<div style="padding:12px 16px;display:flex;gap:8px;align-items:center;border-top:1px solid var(--border)">
          <button onclick="productPage=${Math.max(1,productPage-1)};loadProducts()" ${productPage<=1?'disabled':''}>← Prev</button>
          <span class="muted" style="font-size:12px">Page ${productPage} of ${pages}</span>
          <button onclick="productPage=${Math.min(pages,productPage+1)};loadProducts()" ${productPage>=pages?'disabled':''}>Next →</button>
        </div>` : ''}
      </div>
    `);
  } catch (e) {
    setContent(`<div class="empty" style="color:var(--red)">Error: ${e.message}</div>`);
  }
}

async function openProductForm(p) {
  const isEdit = !!p;
  // load categories for select
  let catOpts = '<option value="">Select category</option>';
  try {
    const cats = await api('GET', '/categories');
    (cats?.data || cats || []).forEach(c => {
      catOpts += `<option value="${c.id}" ${p?.category?.id===c.id?'selected':''}>${esc(c.name)}</option>`;
    });
  } catch {}

  openModal(
    isEdit ? 'Edit Product' : 'Add Product',
    `<div class="field"><label>Name</label><input id="pf-name" value="${esc(p?.name||'')}" placeholder="Classic Banana Chips (200g)" /></div>
     <div class="field"><label>Description</label><textarea id="pf-desc" rows="3" placeholder="Short description…">${esc(p?.description||'')}</textarea></div>
     <div class="grid2">
       <div class="field"><label>Price (₹)</label><input id="pf-price" type="number" min="0" value="${p?.price||''}" /></div>
       <div class="field"><label>Category</label><select id="pf-cat">${catOpts}</select></div>
     </div>
     <div class="field"><label>Images</label><input type="file" id="pf-imgs" multiple accept="image/*" /></div>
     <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-top:4px">
       <input id="pf-pub" type="checkbox" style="width:auto" ${p?.isPublished!==false?'checked':''} />
       <span style="font-size:13px;font-weight:normal;text-transform:none;letter-spacing:0">Publish immediately</span>
     </label>
     <div class="error-msg" id="pf-err"></div>`,
    `<button onclick="closeModal()">Cancel</button>
     <button class="primary" onclick="saveProduct('${p?.id||''}')">
       ${isEdit ? 'Save Changes' : 'Create Product'}
     </button>`
  );
}

async function saveProduct(id) {
  const name = document.getElementById('pf-name').value.trim();
  const desc = document.getElementById('pf-desc').value.trim();
  const price = parseFloat(document.getElementById('pf-price').value);
  const categoryId = document.getElementById('pf-cat').value || undefined;
  const isPublished = document.getElementById('pf-pub').checked;
  const errEl = document.getElementById('pf-err');
  errEl.textContent = '';
  if (!name) { errEl.textContent = 'Name is required'; return; }
  if (!price || price <= 0) { errEl.textContent = 'Price must be > 0'; return; }

  const slug = name.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '') + '-' + Date.now().toString().slice(-4);
  const imgs = document.getElementById('pf-imgs').files;

  try {
    let savedProduct;
    if (id) {
      savedProduct = await api('PUT', `/products/${id}`, { name, slug, description: desc, price, categoryId, isPublished });
    } else {
      savedProduct = await api('POST', '/products', { name, slug, description: desc, price, categoryId, isPublished });
    }

    if (imgs && imgs.length > 0) {
      const prodId = id || savedProduct.id;
      const formData = new FormData();
      for (let i = 0; i < imgs.length; i++) {
        formData.append('images', imgs[i]);
      }
      
      const uploadOpts = {
        method: 'POST',
        body: formData,
        headers: {
          ...(accessToken ? { Authorization: `Bearer ${accessToken}` } : {}),
        }
      };
      
      const imgRes = await fetch(API + `/products/${prodId}/images`, uploadOpts);
      if (!imgRes.ok) throw new Error("Product saved, but image upload failed.");
    }

    closeModal();
    loadProducts();
  } catch (e) {
    errEl.textContent = e.message;
  }
}

async function deleteProduct(id, name) {
  if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
  try {
    await api('DELETE', `/products/${id}`);
    loadProducts();
  } catch (e) {
    alert(e.message);
  }
}

/* ── Inventory ───────────────────────────────────────────── */
async function renderInventory() {
  setContent('<div class="loading">Loading inventory…</div>');
  try {
    const data = await api('GET', '/products/admin/all?limit=50');
    if (!data) return;
    const items = data.data || data;

    const rows = items.map(inv_raw => {
      const inv = inv_raw.inventory || { stock: 0, reservedStock: 0 };
      const avail = inv.stock;
      const pct = Math.min(100, Math.max(0, (avail / Math.max(inv.stock || 1, 1)) * 100));
      const color = avail <= 0 ? 'var(--muted)' : avail <= 10 ? 'var(--amber)' : 'var(--green)';
      return `<tr>
        <td><strong>${esc(inv_raw.name || '—')}</strong></td>
        <td class="text-right">${fmtINR(inv_raw.price || 0)}</td>
        <td style="width:120px">
          <div style="font-weight:600">${inv.stock}</div>
          <div class="stock-bar"><div class="stock-bar-fill" style="width:${pct}%;background:${color}"></div></div>
        </td>
        <td>${badgeStock(avail)}</td>
        <td class="text-right">
          <button onclick="openRestockModal('${inv_raw.id}','${inv_raw.id}',${inv.stock},'${esc(inv_raw.name||'')}')">Restock</button>
        </td>
      </tr>`;
    }).join('') || '<tr><td colspan="5" class="empty">No inventory entries</td></tr>';

    setContent(`
      <div class="panel">
        <div class="panel-header"><h2>Inventory</h2><span class="muted" style="font-size:12px">${items.length} products tracked</span></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Product</th><th class="text-right">Price</th><th>Total Stock</th><th>Available</th><th></th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    `);
  } catch (e) {
    setContent(`<div class="empty" style="color:var(--red)">Error: ${e.message}</div>`);
  }
}

function openRestockModal(invId, productId, currentStock, name) {
  openModal(
    'Update Stock',
    `<p style="margin-bottom:12px;color:var(--muted)">Product: <strong style="color:var(--text)">${esc(name)}</strong></p>
     <div class="field"><label>Current Stock</label><input value="${currentStock}" disabled /></div>
     <div class="field"><label>New Total Stock</label><input id="restock-val" type="number" min="0" value="${currentStock}" /></div>
     <div class="error-msg" id="rs-err"></div>`,
    `<button onclick="closeModal()">Cancel</button>
     <button class="primary" onclick="doRestock('${invId}','${productId}')">Update</button>`
  );
}

async function doRestock(invId, productId) {
  const val = parseInt(document.getElementById('restock-val').value, 10);
  const errEl = document.getElementById('rs-err');
  errEl.textContent = '';
  if (isNaN(val) || val < 0) { errEl.textContent = 'Enter a valid stock number'; return; }
  try {
    await api('PUT', `/inventory/${productId}`, { stock: val });
    closeModal();
    renderInventory();
  } catch (e) {
    errEl.textContent = e.message;
  }
}

/* ── Categories ──────────────────────────────────────────── */
async function renderCategories() {
  setContent('<div class="loading">Loading categories…</div>');
  document.getElementById('topbar-actions').innerHTML = `<button class="primary" onclick="openCategoryForm()">+ Add Category</button>`;
  await loadCategories();
}

async function loadCategories() {
  try {
    const data = await api('GET', '/categories');
    const items = data?.data || data || [];
    const rows = items.map(c => `
      <tr>
        <td><strong>${esc(c.name)}</strong></td>
        <td class="mono muted">${esc(c.slug)}</td>
        <td>${c._count?.products ?? c.productCount ?? '—'}</td>
        <td class="text-right">
          <button onclick='openCategoryForm(${JSON.stringify(c)})' style="margin-right:4px">Edit</button>
          <button onclick="deleteCategory('${c.id}','${esc(c.name)}')" style="color:var(--red)">Del</button>
        </td>
      </tr>`).join('') || '<tr><td colspan="4" class="empty">No categories yet</td></tr>';

    setContent(`
      <div class="panel">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Name</th><th>Slug</th><th>Products</th><th></th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    `);
  } catch (e) {
    setContent(`<div class="empty" style="color:var(--red)">Error: ${e.message}</div>`);
  }
}

function openCategoryForm(c) {
  const isEdit = !!c;
  openModal(
    isEdit ? 'Edit Category' : 'Add Category',
    `<div class="field"><label>Name</label><input id="cf-name" value="${esc(c?.name||'')}" placeholder="Banana Chips" /></div>
     <div class="field"><label>Slug</label><input id="cf-slug" value="${esc(c?.slug||'')}" placeholder="banana-chips" /></div>
     <div class="field"><label>Description (optional)</label><textarea id="cf-desc" rows="2">${esc(c?.description||'')}</textarea></div>
     <div class="error-msg" id="cf-err"></div>`,
    `<button onclick="closeModal()">Cancel</button>
     <button class="primary" onclick="saveCategory('${c?.id||''}')">
       ${isEdit ? 'Save' : 'Create'}
     </button>`
  );
  // auto-slug
  document.getElementById('cf-name').oninput = function() {
    const slugEl = document.getElementById('cf-slug');
    if (!c) slugEl.value = this.value.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
  };
}

async function saveCategory(id) {
  const name = document.getElementById('cf-name').value.trim();
  const slug = document.getElementById('cf-slug').value.trim();
  const description = document.getElementById('cf-desc').value.trim();
  const errEl = document.getElementById('cf-err');
  errEl.textContent = '';
  if (!name) { errEl.textContent = 'Name is required'; return; }
  if (!slug)  { errEl.textContent = 'Slug is required'; return; }
  try {
    if (id) {
      await api('PUT', `/categories/${id}`, { name, slug, description });
    } else {
      await api('POST', '/categories', { name, slug, description });
    }
    closeModal();
    loadCategories();
  } catch (e) {
    errEl.textContent = e.message;
  }
}

async function deleteCategory(id, name) {
  if (!confirm(`Delete category "${name}"?`)) return;
  try {
    await api('DELETE', `/categories/${id}`);
    loadCategories();
  } catch (e) {
    alert(e.message);
  }
}

/* ── Orders ──────────────────────────────────────────────── */
let orderStatusFilter = '', orderPage = 1;
async function renderOrders() {
  setContent('<div class="loading">Loading orders…</div>');
  await loadOrders();
}

async function loadOrders() {
  try {
    const qs = `?page=${orderPage}&limit=20${orderStatusFilter ? '&status=' + orderStatusFilter : ''}`;
    const data = await api('GET', '/orders' + qs);
    if (!data) return;
    const items = data.data || data;
    const meta  = data.meta || {};

    const filters = ['', 'PENDING', 'CONFIRMED', 'SHIPPED', 'DELIVERED', 'CANCELLED'].map(s => {
      const label = s || 'All';
      const active = orderStatusFilter === s;
      return `<button onclick="orderStatusFilter='${s}';orderPage=1;loadOrders()" 
               style="${active ? 'background:var(--text);color:#fff;border-color:var(--text)' : ''}"
               >${label}</button>`;
    }).join('');

    const rows = items.map(o => `
      <tr>
        <td class="mono">#${o.id.slice(-8).toUpperCase()}</td>
        <td>${esc(o.user?.email || '—')}<br><span class="muted" style="font-size:11px">${esc(o.address?.city || '')}</span></td>
        <td>${o.items?.length || 0} item${o.items?.length !== 1 ? 's' : ''}</td>
        <td class="text-right"><strong>${fmtINR(o.totalAmount)}</strong></td>
        <td>${badgeStatus(o.status)}</td>
        <td class="muted">${fmtDate(o.createdAt)}</td>
        <td class="text-right">
          <button onclick='openStatusModal(${JSON.stringify(o)})'>Update</button>
        </td>
      </tr>`).join('') || '<tr><td colspan="7" class="empty">No orders found</td></tr>';

    const pages = meta.totalPages || 1;

    setContent(`
      <div class="toolbar">${filters}
        <span class="muted" style="margin-left:auto;font-size:12px">${meta.total || items.length} orders</span>
      </div>
      <div class="panel">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Order</th><th>Customer</th><th>Items</th><th>Amount</th><th>Status</th><th>Date</th><th></th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
        ${pages > 1 ? `<div style="padding:12px 16px;display:flex;gap:8px;align-items:center;border-top:1px solid var(--border)">
          <button onclick="orderPage=${Math.max(1,orderPage-1)};loadOrders()" ${orderPage<=1?'disabled':''}>← Prev</button>
          <span class="muted" style="font-size:12px">Page ${orderPage} of ${pages}</span>
          <button onclick="orderPage=${Math.min(pages,orderPage+1)};loadOrders()" ${orderPage>=pages?'disabled':''}>Next →</button>
        </div>` : ''}
      </div>
    `);
  } catch (e) {
    setContent(`<div class="empty" style="color:var(--red)">Error: ${e.message}</div>`);
  }
}

function openStatusModal(order) {
  const statuses = ['PENDING','CONFIRMED','SHIPPED','DELIVERED','CANCELLED'];
  const opts = statuses.map(s => `<option value="${s}" ${order.status===s?'selected':''}>${s}</option>`).join('');
  const history = (order.statusHistory || []).slice(-4).map(h =>
    `<div style="display:flex;gap:8px;align-items:center;font-size:12px;padding:4px 0">
      ${badgeStatus(h.status)}<span class="muted">${fmtDate(h.createdAt)}</span>${h.notes?`<span>— ${esc(h.notes)}</span>`:''}
    </div>`
  ).join('');

  openModal(
    `Order #${order.id.slice(-8).toUpperCase()}`,
    `<div style="font-size:12px;color:var(--muted);margin-bottom:12px">${esc(order.user?.email||'')} · ${fmtINR(order.totalAmount)}</div>
     ${history ? `<div style="border:1px solid var(--border);border-radius:var(--radius);padding:10px;margin-bottom:14px">${history}</div>` : ''}
     <div class="field"><label>New Status</label><select id="su-status">${opts}</select></div>
     <div class="field"><label>Note (optional)</label><input id="su-note" placeholder="Add a note…" /></div>
     <div class="error-msg" id="su-err"></div>`,
    `<button onclick="closeModal()">Cancel</button>
     <button class="primary" onclick="updateOrderStatus('${order.id}')">Update</button>`
  );
}

async function updateOrderStatus(id) {
  const status = document.getElementById('su-status').value;
  const notes  = document.getElementById('su-note').value.trim();
  const errEl  = document.getElementById('su-err');
  errEl.textContent = '';
  try {
    await api('PUT', `/orders/${id}/status`, { status, notes: notes || undefined });
    closeModal();
    loadOrders();
  } catch (e) {
    errEl.textContent = e.message;
  }
}

/* ── Customers ───────────────────────────────────────────── */
let customerSearch = '', customerPage = 1;
async function renderCustomers() {
  setContent('<div class="loading">Loading customers…</div>');
  await loadCustomers();
}

async function loadCustomers() {
  try {
    const qs = `?page=${customerPage}&limit=20${customerSearch ? '&search=' + encodeURIComponent(customerSearch) : ''}`;
    const data = await api('GET', '/users' + qs);
    if (!data) return;
    const items = data.data || data;
    const meta  = data.meta || {};

    const rows = items.map(u => {
      const roleB = u.role === 'ADMIN'
        ? `<span class="badge badge-accent">ADMIN</span>`
        : `<span class="badge badge-grey">CUSTOMER</span>`;
      return `<tr>
        <td>
          <div style="display:flex;align-items:center;gap:8px">
            <div style="width:30px;height:30px;border-radius:50%;background:var(--accent-lt);color:var(--accent);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
              ${u.email.charAt(0).toUpperCase()}
            </div>
            <span>${esc(u.email)}</span>
          </div>
        </td>
        <td>${roleB}</td>
        <td class="text-right">${u._count?.orders ?? '—'}</td>
        <td class="muted">${fmtDate(u.createdAt)}</td>
      </tr>`;
    }).join('') || '<tr><td colspan="4" class="empty">No customers found</td></tr>';

    const pages = meta.totalPages || 1;

    setContent(`
      <div class="toolbar">
        <input placeholder="Search email…" value="${esc(customerSearch)}" oninput="customerSearch=this.value" onkeydown="if(event.key==='Enter'){customerPage=1;loadCustomers()}" style="max-width:240px" />
        <button onclick="customerPage=1;loadCustomers()">Search</button>
        <span class="muted" style="margin-left:auto;font-size:12px">${meta.total || items.length} users</span>
      </div>
      <div class="panel">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Email</th><th>Role</th><th>Orders</th><th>Joined</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
        ${pages > 1 ? `<div style="padding:12px 16px;display:flex;gap:8px;align-items:center;border-top:1px solid var(--border)">
          <button onclick="customerPage=${Math.max(1,customerPage-1)};loadCustomers()" ${customerPage<=1?'disabled':''}>← Prev</button>
          <span class="muted" style="font-size:12px">Page ${customerPage} of ${pages}</span>
          <button onclick="customerPage=${Math.min(pages,customerPage+1)};loadCustomers()" ${customerPage>=pages?'disabled':''}>Next →</button>
        </div>` : ''}
      </div>
    `);
  } catch (e) {
    setContent(`<div class="empty" style="color:var(--red)">Error: ${e.message}</div>`);
  }
}

/* ── Escape helper ───────────────────────────────────────── */
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Boot ────────────────────────────────────────────────── */
async function boot() {
  accessToken = 'mock-token'; 
  currentUser = { email: 'admin@blrsnacks.co', role: 'ADMIN' };
  document.getElementById('admin-email').textContent = currentUser.email;
  navigate('dashboard');
}
boot();
</script>
